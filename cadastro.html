<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Acesso | Gabriel Silva</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- BcryptJS para hash de senhas -->
  <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/bcrypt.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a0a0f 0%, #0d0d14 50%, #0f0f18 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
    }

    .bg-shapes {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }
    .shape {
      position: absolute;
      background: rgba(124, 58, 237, 0.06);
      border-radius: 50%;
      filter: blur(70px);
      animation: float 22s infinite ease-in-out;
    }
    .shape-1 { width: 450px; height: 450px; top: -150px; left: -150px; }
    .shape-2 { width: 550px; height: 550px; bottom: -200px; right: -150px; animation-delay: -6s; }
    .shape-3 { width: 320px; height: 320px; top: 60%; left: 20%; animation-delay: -12s; }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.5; }
      50% { transform: translate(25px, -20px) scale(1.08); opacity: 0.8; }
    }

    .auth-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 500px;
      background: rgba(19, 19, 26, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 48px;
      padding: 2rem;
      border: 1px solid rgba(124, 58, 237, 0.35);
      box-shadow: 0 30px 55px -15px rgba(0, 0, 0, 0.6);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo-icon {
      width: 70px;
      height: 70px;
      background: linear-gradient(145deg, #7c3aed, #a855f7);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      box-shadow: 0 12px 25px -8px rgba(124, 58, 237, 0.4);
    }
    .logo-icon i {
      font-size: 2.2rem;
      color: white;
    }
    .auth-header h1 {
      font-size: 1.9rem;
      font-weight: 800;
      background: linear-gradient(135deg, #e0d4ff, #c084fc, #a855f7);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .auth-header p {
      color: #9b8cbf;
      font-size: 0.85rem;
      margin-top: 0.5rem;
    }

    .tabs {
      display: flex;
      gap: 0.8rem;
      margin-bottom: 2rem;
      background: #0f0f17;
      padding: 0.35rem;
      border-radius: 60px;
      border: 1px solid #252536;
    }
    .tab-btn {
      flex: 1;
      background: transparent;
      border: none;
      padding: 0.75rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 50px;
      transition: all 0.25s;
      color: #b8b9d6;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: white;
      box-shadow: 0 6px 14px rgba(124, 58, 237, 0.35);
    }

    .form {
      display: none;
      flex-direction: column;
      gap: 1.3rem;
    }
    .form.active {
      display: flex;
    }
    .input-group {
      position: relative;
    }
    .input-group i {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #a855f7;
      font-size: 1rem;
    }
    input {
      width: 100%;
      padding: 1rem 1rem 1rem 3rem;
      background: #0c0c13;
      border: 1.5px solid #262636;
      border-radius: 34px;
      font-size: 0.95rem;
      color: #f0f0f5;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }
    input:focus {
      outline: none;
      border-color: #a855f7;
      box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.2);
      background: #111118;
    }
    input::placeholder {
      color: #5e5e78;
    }

    .captcha-container {
      display: flex;
      justify-content: center;
      margin: 0.3rem 0;
    }
    .g-recaptcha {
      transform: scale(0.95);
      transform-origin: center;
    }

    .submit-btn {
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border: none;
      padding: 1rem;
      border-radius: 44px;
      font-weight: 700;
      font-size: 1rem;
      color: white;
      cursor: pointer;
      transition: 0.25s;
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .submit-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 28px -6px rgba(124, 58, 237, 0.55);
    }
    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .message {
      padding: 0.8rem;
      border-radius: 28px;
      font-size: 0.85rem;
      text-align: center;
      display: none;
      font-weight: 500;
    }
    .message.error {
      background: rgba(239, 68, 68, 0.12);
      color: #ffa4a4;
      border-left: 3px solid #ef4444;
      display: block;
    }
    .message.success {
      background: rgba(34, 197, 94, 0.1);
      color: #8bffb4;
      border-left: 3px solid #22c55e;
      display: block;
    }

    .info-text {
      font-size: 0.7rem;
      color: #7c6b9e;
      text-align: center;
      margin-top: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .info-text i {
      color: #a855f7;
    }

    @media (max-width: 540px) {
      body { padding: 1rem; }
      .auth-container { padding: 1.5rem; }
      .captcha-container { transform: scale(0.82); }
    }
  </style>
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
<div class="bg-shapes">
  <div class="shape shape-1"></div>
  <div class="shape shape-2"></div>
  <div class="shape shape-3"></div>
</div>

<div class="auth-container">
  <div class="auth-header">
    <div class="logo-icon">
      <i class="fas fa-feather-alt"></i>
    </div>
    <h1>Gabriel Silva</h1>
    <p>Explore todo o conteúdo com segurança</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="login">🔐 Acessar conta</button>
    <button class="tab-btn" data-tab="register">✨ Criar conta</button>
  </div>

  <form id="loginForm" class="form active">
    <div class="input-group">
      <i class="fas fa-envelope"></i>
      <input type="email" id="loginEmail" placeholder="seu@email.com" autocomplete="email" required>
    </div>
    <div class="input-group">
      <i class="fas fa-lock"></i>
      <input type="password" id="loginPassword" placeholder="Senha" autocomplete="current-password" required>
    </div>
    <div class="captcha-container">
      <div class="g-recaptcha" data-sitekey="6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI" data-callback="onCaptchaLoginSuccess"></div>
    </div>
    <button type="submit" class="submit-btn" id="loginBtn" disabled><i class="fas fa-arrow-right-to-bracket"></i> Entrar agora</button>
    <div id="loginMessage" class="message"></div>
  </form>

  <form id="registerForm" class="form">
    <div class="input-group">
      <i class="fas fa-user-astronaut"></i>
      <input type="text" id="regName" placeholder="Nome completo" autocomplete="name" required>
    </div>
    <div class="input-group">
      <i class="fas fa-envelope"></i>
      <input type="email" id="regEmail" placeholder="Melhor e-mail" autocomplete="email" required>
    </div>
    <div class="input-group">
      <i class="fas fa-key"></i>
      <input type="password" id="regPassword" placeholder="Senha (mínimo 6 caracteres)" autocomplete="new-password" required>
    </div>
    <div class="input-group">
      <i class="fas fa-check-circle"></i>
      <input type="password" id="regConfirmPassword" placeholder="Confirmar senha" autocomplete="off" required>
    </div>
    <div class="captcha-container">
      <div class="g-recaptcha" data-sitekey="6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI" data-callback="onCaptchaRegisterSuccess"></div>
    </div>
    <button type="submit" class="submit-btn" id="registerBtn" disabled><i class="fas fa-user-plus"></i> Criar conta</button>
    <div id="registerMessage" class="message"></div>
  </form>

  <div class="info-text">
    <i class="fas fa-shield-alt"></i> Senhas protegidas com bcrypt • reCAPTCHA v2
  </div>
</div>

<script>
  // ==================== CONFIGURAÇÃO BCRYPT ====================
  // Nível de custo do bcrypt (10 é padrão e seguro)
  const BCRYPT_SALT_ROUNDS = 10;

  // ==================== FUNÇÕES DE HASH ====================
  async function hashPassword(password) {
    return new Promise((resolve, reject) => {
      bcrypt.hash(password, BCRYPT_SALT_ROUNDS, (err, hash) => {
        if (err) reject(err);
        else resolve(hash);
      });
    });
  }

  async function verifyPassword(password, hash) {
    return new Promise((resolve, reject) => {
      bcrypt.compare(password, hash, (err, result) => {
        if (err) reject(err);
        else resolve(result);
      });
    });
  }

  // ==================== USER DATABASE ====================
  function getUsers() { 
    const users = localStorage.getItem('blog_users_bcrypt');
    return users ? JSON.parse(users) : [];
  }
  
  function saveUsers(users) { 
    localStorage.setItem('blog_users_bcrypt', JSON.stringify(users));
  }

  async function registerUser(name, email, password) {
    const users = getUsers();
    if (users.some(u => u.email === email)) return false;
    
    const passwordHash = await hashPassword(password);
    
    const newUser = { 
      name, 
      email, 
      passwordHash,
      provider: 'email',
      createdAt: new Date().toISOString()
    };
    
    users.push(newUser);
    saveUsers(users);
    return true;
  }

  async function authenticateUser(email, password) {
    const users = getUsers();
    const user = users.find(u => u.email === email && u.provider === 'email');
    if (!user) return null;
    
    const isValid = await verifyPassword(password, user.passwordHash);
    return isValid ? user : null;
  }

  function redirectToBlog() {
    setTimeout(() => { 
      window.location.href = "https://gwssite.github.io/GabrielSilva/"; 
    }, 900);
  }
  
  function loginSuccess(name, email) {
    sessionStorage.setItem('blog_logged_user', JSON.stringify({ name, email }));
    redirectToBlog();
  }

  // ==================== reCAPTCHA ====================
  let captchaLogin = false;
  let captchaRegister = false;
  
  window.onCaptchaLoginSuccess = () => { 
    captchaLogin = true; 
    document.getElementById('loginBtn').disabled = false; 
  };
  
  window.onCaptchaRegisterSuccess = () => { 
    captchaRegister = true; 
    document.getElementById('registerBtn').disabled = false; 
  };

  function resetCaptcha(tab) {
    if (tab === 'login') {
      captchaLogin = false;
      document.getElementById('loginBtn').disabled = true;
      if (window.grecaptcha) {
        const el = document.querySelector('#loginForm .g-recaptcha');
        if (el) window.grecaptcha.reset();
      }
    } else {
      captchaRegister = false;
      document.getElementById('registerBtn').disabled = true;
      if (window.grecaptcha) {
        const el = document.querySelector('#registerForm .g-recaptcha');
        if (el) window.grecaptcha.reset();
      }
    }
  }

  function showMessage(divId, msg, type) {
    const el = document.getElementById(divId);
    if (!el) return;
    el.textContent = msg;
    el.className = `message ${type}`;
    el.style.display = 'block';
    setTimeout(() => { 
      if (el) el.style.display = 'none'; 
    }, 4000);
  }

  // ==================== LOGIN ====================
  async function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    
    if (!email || !password) {
      showMessage('loginMessage', '❌ Preencha e-mail e senha.', 'error');
      return;
    }
    if (!captchaLogin) {
      showMessage('loginMessage', '🤖 Complete o reCAPTCHA primeiro.', 'error');
      return;
    }
    
    showMessage('loginMessage', '⏳ Verificando credenciais...', 'success');
    
    try {
      const user = await authenticateUser(email, password);
      if (user) {
        showMessage('loginMessage', '✅ Acesso autorizado! Redirecionando...', 'success');
        loginSuccess(user.name, user.email);
      } else {
        showMessage('loginMessage', '❌ E-mail ou senha incorretos.', 'error');
        captchaLogin = false;
        if (window.grecaptcha) {
          const el = document.querySelector('#loginForm .g-recaptcha');
          if (el) window.grecaptcha.reset();
        }
        document.getElementById('loginBtn').disabled = true;
      }
    } catch (err) { 
      console.error('Erro no login:', err); 
      showMessage('loginMessage', '❌ Erro interno. Tente novamente.', 'error');
    }
  }

  // ==================== REGISTRO ====================
  async function handleRegister(e) {
    e.preventDefault();
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pwd = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regConfirmPassword').value;
    
    if (!name || !email || !pwd || !confirm) {
      showMessage('registerMessage', '❌ Todos os campos são obrigatórios.', 'error');
      return;
    }
    if (pwd.length < 6) {
      showMessage('registerMessage', '⚠️ A senha precisa ter pelo menos 6 caracteres.', 'error');
      return;
    }
    if (pwd !== confirm) {
      showMessage('registerMessage', '❌ As senhas não coincidem.', 'error');
      return;
    }
    if (!captchaRegister) {
      showMessage('registerMessage', '🤖 Complete o reCAPTCHA.', 'error');
      return;
    }
    
    showMessage('registerMessage', '🔐 Criando conta segura...', 'success');
    
    try {
      const success = await registerUser(name, email, pwd);
      if (success) {
        showMessage('registerMessage', '🎉 Conta criada com sucesso!', 'success');
        
        // Limpar formulário
        document.getElementById('regName').value = '';
        document.getElementById('regEmail').value = '';
        document.getElementById('regPassword').value = '';
        document.getElementById('regConfirmPassword').value = '';
        
        // Reset captcha
        if (window.grecaptcha) {
          const el = document.querySelector('#registerForm .g-recaptcha');
          if (el) window.grecaptcha.reset();
        }
        captchaRegister = false;
        document.getElementById('registerBtn').disabled = true;
        
        // Mudar para aba de login
        setTimeout(() => {
          document.querySelector('.tab-btn[data-tab="login"]').click();
          showMessage('loginMessage', '✨ Conta criada! Agora faça login.', 'success');
        }, 1500);
      } else {
        showMessage('registerMessage', '📧 Este e-mail já está cadastrado.', 'error');
        if (window.grecaptcha) {
          const el = document.querySelector('#registerForm .g-recaptcha');
          if (el) window.grecaptcha.reset();
        }
        captchaRegister = false;
        document.getElementById('registerBtn').disabled = true;
      }
    } catch (err) { 
      console.error('Erro no registro:', err);
      showMessage('registerMessage', '❌ Erro ao criar conta: ' + err.message, 'error');
    }
  }

  // ==================== TABS ====================
  function switchTab(tab) {
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const loginTab = document.querySelector('.tab-btn[data-tab="login"]');
    const regTab = document.querySelector('.tab-btn[data-tab="register"]');
    
    if (tab === 'login') {
      loginForm.classList.add('active');
      registerForm.classList.remove('active');
      loginTab.classList.add('active');
      regTab.classList.remove('active');
      document.getElementById('loginMessage').style.display = 'none';
      resetCaptcha('login');
    } else {
      registerForm.classList.add('active');
      loginForm.classList.remove('active');
      regTab.classList.add('active');
      loginTab.classList.remove('active');
      document.getElementById('registerMessage').style.display = 'none';
      resetCaptcha('register');
    }
  }

  // ==================== EVENT LISTENERS ====================
  document.getElementById('loginForm').addEventListener('submit', handleLogin);
  document.getElementById('registerForm').addEventListener('submit', handleRegister);
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  // ==================== CRIAR USUÁRIO DEMO ====================
  window.addEventListener('load', async () => {
    const users = getUsers();
    if (users.length === 0) {
      try {
        await registerUser('Visitante Demo', 'demo@blog.com', '123456');
        console.log('✅ Usuário demo criado com sucesso!');
        console.log('📝 Credenciais: demo@blog.com / 123456');
      } catch(e) { 
        console.error('Erro ao criar demo:', e); 
      }
    }
    document.getElementById('loginBtn').disabled = true;
    document.getElementById('registerBtn').disabled = true;
  });
</script>
</body>
</html>
