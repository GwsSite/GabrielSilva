<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Área do Leitor | Gabriel Silva</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a0a0f 0%, #0d0d14 50%, #0f0f18 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
    }

    /* Animated background particles effect */
    .bg-shapes {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }
    .shape {
      position: absolute;
      background: rgba(124, 58, 237, 0.08);
      border-radius: 50%;
      filter: blur(60px);
      animation: float 20s infinite ease-in-out;
    }
    .shape-1 { width: 400px; height: 400px; top: -150px; left: -150px; }
    .shape-2 { width: 500px; height: 500px; bottom: -200px; right: -150px; animation-delay: -5s; }
    .shape-3 { width: 300px; height: 300px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -10s; }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.4; }
      50% { transform: translate(30px, -20px) scale(1.1); opacity: 0.7; }
    }

    /* Main Card */
    .auth-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 480px;
      background: rgba(19, 19, 26, 0.9);
      backdrop-filter: blur(20px);
      border-radius: 48px;
      padding: 2rem;
      border: 1px solid rgba(124, 58, 237, 0.3);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      transition: 0.3s;
    }

    /* Header */
    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
    }
    .logo-icon i {
      font-size: 2rem;
      color: white;
    }
    .auth-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #c084fc, #a855f7);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .auth-header p {
      color: #8b8ca8;
      font-size: 0.85rem;
      margin-top: 0.5rem;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      background: #0a0a0f;
      padding: 0.3rem;
      border-radius: 60px;
    }
    .tab-btn {
      flex: 1;
      background: transparent;
      border: none;
      padding: 0.75rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 40px;
      transition: 0.2s;
      color: #b8b9d6;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: white;
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.4);
    }

    /* Forms */
    .form {
      display: none;
      flex-direction: column;
      gap: 1.2rem;
    }
    .form.active {
      display: flex;
    }
    .input-group {
      position: relative;
    }
    .input-group i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #7c3aed;
      font-size: 1rem;
    }
    input {
      width: 100%;
      padding: 0.9rem 1rem 0.9rem 2.8rem;
      background: #0a0a0f;
      border: 1.5px solid #2a2a35;
      border-radius: 28px;
      font-size: 0.95rem;
      color: #ecedee;
      transition: 0.2s;
      font-family: 'Inter', sans-serif;
    }
    input:focus {
      outline: none;
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);
    }
    input::placeholder {
      color: #5a5a70;
    }

    /* reCAPTCHA container */
    .captcha-container {
      display: flex;
      justify-content: center;
      margin: 0.5rem 0;
      transform: scale(0.92);
      transform-origin: center;
    }
    .g-recaptcha {
      transform: scale(0.92);
      transform-origin: center;
    }

    /* Submit Button */
    .submit-btn {
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border: none;
      padding: 0.9rem;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1rem;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(124, 58, 237, 0.5);
      filter: brightness(1.05);
    }
    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Message */
    .message {
      padding: 0.75rem;
      border-radius: 28px;
      font-size: 0.85rem;
      text-align: center;
      display: none;
    }
    .message.error {
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
      border-left: 3px solid #ef4444;
      display: block;
    }
    .message.success {
      background: rgba(34, 197, 94, 0.15);
      color: #4ade80;
      border-left: 3px solid #22c55e;
      display: block;
    }
    .info-text {
      font-size: 0.7rem;
      color: #6a6a80;
      text-align: center;
      margin-top: 1rem;
    }
    .demo-note {
      background: rgba(124, 58, 237, 0.1);
      padding: 0.8rem;
      border-radius: 20px;
      font-size: 0.7rem;
      text-align: center;
      color: #c084fc;
      margin-top: 1rem;
    }

    @media (max-width: 520px) {
      .auth-container { padding: 1.5rem; margin: 1rem; }
      .captcha-container { transform: scale(0.8); }
    }
  </style>
  <!-- Google reCAPTCHA v2 -->
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
<div class="bg-shapes">
  <div class="shape shape-1"></div>
  <div class="shape shape-2"></div>
  <div class="shape shape-3"></div>
</div>

<div class="auth-container">
  <div class="auth-header">
    <div class="logo-icon">
      <i class="fas fa-feather-alt"></i>
    </div>
    <h1>Gabriel Silva</h1>
    <p>Acesse para explorar todo o conteúdo</p>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="login">🔐 Entrar</button>
    <button class="tab-btn" data-tab="register">📝 Criar conta</button>
  </div>

  <!-- Login Form -->
  <form id="loginForm" class="form active">
    <div class="input-group">
      <i class="fas fa-envelope"></i>
      <input type="email" id="loginEmail" placeholder="seu@email.com" required>
    </div>
    <div class="input-group">
      <i class="fas fa-lock"></i>
      <input type="password" id="loginPassword" placeholder="Senha" required>
    </div>
    <div class="captcha-container">
      <div class="g-recaptcha" data-sitekey="6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI" data-callback="onCaptchaSuccess"></div>
    </div>
    <button type="submit" class="submit-btn" id="loginBtn"><i class="fas fa-arrow-right-to-bracket"></i> Entrar</button>
    <div id="loginMessage" class="message"></div>
  </form>

  <!-- Register Form -->
  <form id="registerForm" class="form">
    <div class="input-group">
      <i class="fas fa-user"></i>
      <input type="text" id="regName" placeholder="Nome completo" required>
    </div>
    <div class="input-group">
      <i class="fas fa-envelope"></i>
      <input type="email" id="regEmail" placeholder="seu@email.com" required>
    </div>
    <div class="input-group">
      <i class="fas fa-lock"></i>
      <input type="password" id="regPassword" placeholder="Senha (mínimo 6 caracteres)" required>
    </div>
    <div class="input-group">
      <i class="fas fa-check-circle"></i>
      <input type="password" id="regConfirmPassword" placeholder="Confirmar senha" required>
    </div>
    <div class="captcha-container">
      <div class="g-recaptcha" data-sitekey="6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI" data-callback="onCaptchaSuccessRegister"></div>
    </div>
    <button type="submit" class="submit-btn" id="registerBtn"><i class="fas fa-user-plus"></i> Criar conta</button>
    <div id="registerMessage" class="message"></div>
  </form>

  <div class="demo-note">
    <i class="fas fa-info-circle"></i> Demonstração: Use qualquer email/senha ou crie uma conta. Após login, você será redirecionado para o blog.
  </div>
  <div class="info-text">
    ⚡ Protegido com reCAPTCHA v2 | Nenhum dado real é armazenado
  </div>
</div>

<script>
  // Simulated in-memory "database" for demo purposes (works like a charm for testing)
  // In a real scenario, you'd use Firebase Auth, but here we simulate persistence via localStorage
  // because the user requested a working demo with captcha and redirect.
  
  let captchaLoginResolved = false;
  let captchaRegisterResolved = false;

  // reCAPTCHA callbacks
  window.onCaptchaSuccess = function() {
    captchaLoginResolved = true;
    const btn = document.getElementById('loginBtn');
    if (btn) btn.disabled = false;
  };
  
  window.onCaptchaSuccessRegister = function() {
    captchaRegisterResolved = true;
    const btn = document.getElementById('registerBtn');
    if (btn) btn.disabled = false;
  };

  // Reset captcha state when switching tabs (optional but good UX)
  function resetCaptcha() {
    captchaLoginResolved = false;
    captchaRegisterResolved = false;
    if (window.grecaptcha) {
      try {
        // Reset both recaptcha widgets if they exist
        const loginCaptcha = document.querySelector('#loginForm .g-recaptcha');
        const registerCaptcha = document.querySelector('#registerForm .g-recaptcha');
        if (loginCaptcha && window.grecaptcha.reset) window.grecaptcha.reset();
        if (registerCaptcha && window.grecaptcha.reset) window.grecaptcha.reset();
      } catch(e) { console.warn("captcha reset error", e); }
    }
    const loginBtn = document.getElementById('loginBtn');
    const registerBtn = document.getElementById('registerBtn');
    if (loginBtn) loginBtn.disabled = true;
    if (registerBtn) registerBtn.disabled = true;
  }

  // Helper to show message
  function showMessage(elementId, message, type) {
    const msgDiv = document.getElementById(elementId);
    if (!msgDiv) return;
    msgDiv.textContent = message;
    msgDiv.className = `message ${type}`;
    msgDiv.style.display = 'block';
    setTimeout(() => {
      if (msgDiv) msgDiv.style.display = 'none';
    }, 4000);
  }

  // Store users in localStorage (simulated DB)
  function getUsers() {
    const users = localStorage.getItem('blog_users');
    return users ? JSON.parse(users) : [];
  }
  
  function saveUsers(users) {
    localStorage.setItem('blog_users', JSON.stringify(users));
  }
  
  function isEmailRegistered(email) {
    const users = getUsers();
    return users.some(user => user.email === email);
  }
  
  function registerUser(name, email, password) {
    const users = getUsers();
    if (isEmailRegistered(email)) return false;
    users.push({ name, email, password, createdAt: new Date().toISOString() });
    saveUsers(users);
    return true;
  }
  
  function authenticateUser(email, password) {
    const users = getUsers();
    return users.find(user => user.email === email && user.password === password);
  }

  // Redirect to target site
  function redirectToBlog() {
    // Pequeno atraso para mostrar mensagem de sucesso
    setTimeout(() => {
      window.location.href = "https://gwssite.github.io/GabrielSilva/";
    }, 800);
  }

  // Handle Login
  async function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    
    if (!email || !password) {
      showMessage('loginMessage', '❌ Preencha email e senha.', 'error');
      return;
    }
    
    if (!captchaLoginResolved) {
      showMessage('loginMessage', '🤖 Por favor, complete o reCAPTCHA.', 'error');
      return;
    }
    
    // Simular verificação (demonstração com validação local)
    const user = authenticateUser(email, password);
    if (user) {
      sessionStorage.setItem('blog_logged_user', JSON.stringify({ name: user.name, email: user.email }));
      showMessage('loginMessage', '✅ Login bem-sucedido! Redirecionando...', 'success');
      redirectToBlog();
    } else {
      showMessage('loginMessage', '❌ Email ou senha inválidos. Crie uma conta primeiro.', 'error');
      // reset captcha after failed attempt
      captchaLoginResolved = false;
      if (window.grecaptcha) {
        const loginCaptcha = document.querySelector('#loginForm .g-recaptcha');
        if (loginCaptcha) window.grecaptcha.reset();
      }
      document.getElementById('loginBtn').disabled = true;
    }
  }
  
  // Handle Register
  async function handleRegister(e) {
    e.preventDefault();
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirmPassword = document.getElementById('regConfirmPassword').value;
    
    if (!name || !email || !password || !confirmPassword) {
      showMessage('registerMessage', '❌ Todos os campos são obrigatórios.', 'error');
      return;
    }
    
    if (password.length < 6) {
      showMessage('registerMessage', '⚠️ A senha deve ter pelo menos 6 caracteres.', 'error');
      return;
    }
    
    if (password !== confirmPassword) {
      showMessage('registerMessage', '❌ As senhas não coincidem.', 'error');
      return;
    }
    
    if (!captchaRegisterResolved) {
      showMessage('registerMessage', '🤖 Por favor, complete o reCAPTCHA.', 'error');
      return;
    }
    
    if (isEmailRegistered(email)) {
      showMessage('registerMessage', '📧 Este email já está cadastrado. Faça login.', 'error');
      // reset captcha
      captchaRegisterResolved = false;
      if (window.grecaptcha) {
        const regCaptcha = document.querySelector('#registerForm .g-recaptcha');
        if (regCaptcha) window.grecaptcha.reset();
      }
      document.getElementById('registerBtn').disabled = true;
      return;
    }
    
    const success = registerUser(name, email, password);
    if (success) {
      showMessage('registerMessage', '🎉 Conta criada com sucesso! Faça login para continuar.', 'success');
      // limpar formulário de registro e mudar para aba de login
      document.getElementById('regName').value = '';
      document.getElementById('regEmail').value = '';
      document.getElementById('regPassword').value = '';
      document.getElementById('regConfirmPassword').value = '';
      
      // reset captcha register after success
      captchaRegisterResolved = false;
      if (window.grecaptcha) {
        const regCaptcha = document.querySelector('#registerForm .g-recaptcha');
        if (regCaptcha) window.grecaptcha.reset();
      }
      document.getElementById('registerBtn').disabled = true;
      
      // Switch to login tab after 1.2 seconds
      setTimeout(() => {
        document.querySelector('.tab-btn[data-tab="login"]').click();
        showMessage('loginMessage', '✨ Conta criada! Agora faça login.', 'success');
      }, 1300);
    } else {
      showMessage('registerMessage', '❌ Erro ao criar conta. Tente novamente.', 'error');
      captchaRegisterResolved = false;
      if (window.grecaptcha) {
        const regCaptcha = document.querySelector('#registerForm .g-recaptcha');
        if (regCaptcha) window.grecaptcha.reset();
      }
      document.getElementById('registerBtn').disabled = true;
    }
  }
  
  // Tab switching logic
  function switchTab(tabId) {
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const loginTab = document.querySelector('.tab-btn[data-tab="login"]');
    const registerTab = document.querySelector('.tab-btn[data-tab="register"]');
    
    if (tabId === 'login') {
      loginForm.classList.add('active');
      registerForm.classList.remove('active');
      loginTab.classList.add('active');
      registerTab.classList.remove('active');
      // reset any messages
      document.getElementById('loginMessage').style.display = 'none';
    } else {
      registerForm.classList.add('active');
      loginForm.classList.remove('active');
      registerTab.classList.add('active');
      loginTab.classList.remove('active');
      document.getElementById('registerMessage').style.display = 'none';
    }
    // Reset captcha state on tab switch
    captchaLoginResolved = false;
    captchaRegisterResolved = false;
    if (window.grecaptcha) {
      const loginCaptcha = document.querySelector('#loginForm .g-recaptcha');
      const registerCaptcha = document.querySelector('#registerForm .g-recaptcha');
      if (loginCaptcha) window.grecaptcha.reset();
      if (registerCaptcha) window.grecaptcha.reset();
    }
    const loginBtn = document.getElementById('loginBtn');
    const registerBtn = document.getElementById('registerBtn');
    if (loginBtn) loginBtn.disabled = true;
    if (registerBtn) registerBtn.disabled = true;
  }
  
  // Event Listeners
  document.getElementById('loginForm').addEventListener('submit', handleLogin);
  document.getElementById('registerForm').addEventListener('submit', handleRegister);
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const tab = btn.getAttribute('data-tab');
      switchTab(tab);
    });
  });
  
  // initial captcha state: buttons disabled
  document.getElementById('loginBtn').disabled = true;
  document.getElementById('registerBtn').disabled = true;
  
  // Pre-populate demo user for convenience? optional: create a demo user if none exists
  if (getUsers().length === 0) {
    registerUser("Visitante Demo", "demo@blog.com", "123456");
  }
  
  // Função para redirecionamento direto caso já esteja logado? não, apenas controle.
  // Caso o usuário queira acessar diretamente a página de login, tudo certo.
  
  // Ajuste de responsividade do captcha
  window.addEventListener('load', () => {
    // Força reCAPTCHA a se ajustar
    if (window.grecaptcha && window.grecaptcha.render) {
      setTimeout(() => {
        try {
          const loginCaptcha = document.querySelector('#loginForm .g-recaptcha');
          const registerCaptcha = document.querySelector('#registerForm .g-recaptcha');
          if (loginCaptcha && !loginCaptcha.hasChildNodes) window.grecaptcha.render(loginCaptcha);
          if (registerCaptcha && !registerCaptcha.hasChildNodes) window.grecaptcha.render(registerCaptcha);
        } catch(e) {}
      }, 100);
    }
  });
</script>
</body>
</html>
