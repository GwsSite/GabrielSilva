<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Blog Gabriel Silva | Início</title>
  <!-- Google Fonts & simple CSS reset -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #ecedee;
      line-height: 1.5;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* header */
    .blog-header {
      text-align: center;
      margin-bottom: 3rem;
      border-bottom: 1px solid #2a2a35;
      padding-bottom: 1.5rem;
    }
    .blog-header h1 {
      font-size: 2.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #c084fc, #a855f7, #7c3aed);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }
    .blog-header p {
      color: #a1a1b0;
      margin-top: 0.5rem;
      font-size: 1.1rem;
    }

    /* posts grid */
    .posts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 2rem;
    }
    .post-card {
      background: #13131a;
      border-radius: 28px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.4), 0 2px 4px rgba(0,0,0,0.2);
      overflow: hidden;
      transition: all 0.25s ease;
      display: flex;
      flex-direction: column;
      border: 1px solid #2a2a35;
    }
    .post-card:hover {
      transform: translateY(-5px);
      border-color: #7c3aed;
      box-shadow: 0 24px 36px -12px rgba(124, 58, 237, 0.25);
    }
    .post-media {
      width: 100%;
      position: relative;
      background: #1e1e2a;
    }
    .post-image {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }
    .video-container {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%; /* 16:9 aspect ratio */
      background: #000;
    }
    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .video-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(124, 58, 237, 0.9);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      backdrop-filter: blur(4px);
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .post-content {
      padding: 1.6rem;
      flex: 1;
    }
    .post-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #f0f0f5;
      line-height: 1.3;
    }
    .post-date {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #9b8cbf;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .post-summary {
      color: #c5c5d2;
      font-size: 0.95rem;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .read-more {
      display: inline-block;
      margin-top: 1rem;
      color: #c084fc;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.85rem;
      transition: 0.2s;
    }
    .read-more:hover {
      color: #e9d5ff;
      transform: translateX(4px);
    }
    .no-posts {
      text-align: center;
      padding: 3rem;
      background: #13131a;
      border-radius: 2rem;
      color: #a1a1b0;
      font-weight: 500;
      border: 1px solid #2a2a35;
    }
    footer {
      margin-top: 4rem;
      text-align: center;
      border-top: 1px solid #2a2a35;
      padding-top: 2rem;
      color: #7a7a8c;
      font-size: 0.85rem;
    }
    .loading {
      text-align: center;
      padding: 3rem;
      font-weight: 500;
      color: #9b8cbf;
    }
    @media (max-width: 640px) {
      .container { padding: 1.5rem; }
      .post-title { font-size: 1.3rem; }
      .posts-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="blog-header">
    <h1>📖 Blog Gabriel Silva</h1>
    <p>Ideias, tecnologia e criatividade — direto da fonte.</p>
  </div>

  <main>
    <div id="postsContainer" class="posts-grid">
      <div class="loading">📡 Carregando artigos...</div>
    </div>
  </main>
  <footer>
    <p>© 2025 Blog Gabriel Silva — Todos os direitos reservados.</p>
  </footer>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<script>
  // Firebase configuration (provided by user)
  const firebaseConfig = {
    apiKey: "AIzaSyChOWLpFaRsy79Fn8QBwWew33huheHGMGE",
    authDomain: "fire-auth-2ca37.firebaseapp.com",
    databaseURL: "https://fire-auth-2ca37-default-rtdb.firebaseio.com",
    projectId: "fire-auth-2ca37",
    storageBucket: "fire-auth-2ca37.firebasestorage.app",
    messagingSenderId: "1047158509788",
    appId: "1:1047158509788:web:058bb4376a4f14ef3ee419",
    measurementId: "G-520K5H9Z1T"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();
  const postsRef = database.ref('blog_posts'); // reference to store posts

  // Helper to escape HTML
  function escapeHtml(str) {
    if (!str) return '';
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  // Helper to format date nicely
  function formatDate(timestamp, formattedDate) {
    if (formattedDate) return formattedDate;
    if (timestamp) {
      return new Date(timestamp).toLocaleDateString('pt-BR', {
        day: '2-digit', month: 'long', year: 'numeric'
      });
    }
    return 'Data desconhecida';
  }

  // Helper to truncate text
  function truncateText(text, maxLength) {
    if (!text) return '';
    if (text.length <= maxLength) return text;
    return text.substring(0, maxLength) + '...';
  }

  // Load and display posts (ordered by date descending)
  function loadPosts() {
    const container = document.getElementById('postsContainer');
    container.innerHTML = '<div class="loading">📚 Buscando publicações...</div>';

    postsRef.orderByChild('createdAt').once('value', (snapshot) => {
      const postsData = snapshot.val();
      container.innerHTML = '';

      if (!postsData) {
        container.innerHTML = '<div class="no-posts">✨ Nenhum post publicado ainda. Volte em breve!</div>';
        return;
      }

      // Convert object to array and sort by timestamp desc (newest first)
      const postsArray = Object.keys(postsData).map(key => ({
        id: key,
        ...postsData[key]
      })).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

      for (const post of postsArray) {
        const card = document.createElement('article');
        card.className = 'post-card';

        const postDate = formatDate(post.createdAt, post.dateFormatted);
        const hasVideo = post.videoUrl && post.videoUrl.trim() !== '' && post.videoEmbedUrl;
        const hasImage = post.imageUrl && post.imageUrl.trim() !== '';
        
        // Build media section (video > image > placeholder)
        let mediaHtml = '';
        
        if (hasVideo) {
          // Show video embed
          mediaHtml = `
            <div class="post-media">
              <div class="video-container">
                <iframe 
                  src="${escapeHtml(post.videoEmbedUrl)}" 
                  frameborder="0" 
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                  allowfullscreen>
                </iframe>
              </div>
              <div class="video-badge">
                🎬 YouTube
              </div>
            </div>
          `;
        } else if (hasImage) {
          // Show image
          mediaHtml = `
            <div class="post-media">
              <img 
                class="post-image" 
                src="${escapeHtml(post.imageUrl)}" 
                alt="capa do post: ${escapeHtml(post.title)}" 
                onerror="this.src='https://placehold.co/600x400/1e1e2a/7c3aed?text=Blog+Gabriel+Silva'"
              >
            </div>
          `;
        } else {
          // Placeholder with gradient
          mediaHtml = `
            <div class="post-media">
              <img 
                class="post-image" 
                src="https://placehold.co/600x400/1e1e2a/7c3aed?text=Blog+Gabriel+Silva" 
                alt="placeholder"
              >
            </div>
          `;
        }

        // Summary text (first 280 chars)
        const summary = truncateText(post.content, 280);
        
        card.innerHTML = `
          ${mediaHtml}
          <div class="post-content">
            <h2 class="post-title">${escapeHtml(post.title)}</h2>
            <div class="post-date">
              <span>📅</span> ${escapeHtml(postDate)}
            </div>
            <p class="post-summary">${escapeHtml(summary)}</p>
            <a href="#" class="read-more" data-id="${post.id}">Ler artigo completo →</a>
          </div>
        `;
        
        container.appendChild(card);
      }
      
      // Add click handlers for "Ler artigo completo" modals
      document.querySelectorAll('.read-more').forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const postId = link.getAttribute('data-id');
          const post = postsArray.find(p => p.id === postId);
          if (post) {
            showFullPostModal(post);
          }
        });
      });
      
    }).catch(error => {
      console.error("Erro ao carregar posts:", error);
      container.innerHTML = `<div class="no-posts">⚠️ Erro ao carregar posts. Verifique conexão com Firebase. <br> <small>${escapeHtml(error.message)}</small></div>`;
    });
  }
  
  // Modal to show full post content
  function showFullPostModal(post) {
    // Create modal overlay
    const modal = document.createElement('div');
    modal.style.position = 'fixed';
    modal.style.top = '0';
    modal.style.left = '0';
    modal.style.width = '100%';
    modal.style.height = '100%';
    modal.style.backgroundColor = 'rgba(0,0,0,0.95)';
    modal.style.zIndex = '1000';
    modal.style.display = 'flex';
    modal.style.alignItems = 'center';
    modal.style.justifyContent = 'center';
    modal.style.padding = '1rem';
    modal.style.overflowY = 'auto';
    modal.style.cursor = 'pointer';
    
    const modalContent = document.createElement('div');
    modalContent.style.backgroundColor = '#13131a';
    modalContent.style.borderRadius = '32px';
    modalContent.style.maxWidth = '800px';
    modalContent.style.width = '100%';
    modalContent.style.maxHeight = '90vh';
    modalContent.style.overflowY = 'auto';
    modalContent.style.padding = '2rem';
    modalContent.style.border = '1px solid #2a2a35';
    modalContent.style.position = 'relative';
    modalContent.style.cursor = 'default';
    
    const postDate = formatDate(post.createdAt, post.dateFormatted);
    const hasVideo = post.videoUrl && post.videoUrl.trim() !== '' && post.videoEmbedUrl;
    const hasImage = post.imageUrl && post.imageUrl.trim() !== '';
    
    // Build media for modal
    let mediaHtml = '';
    if (hasVideo) {
      mediaHtml = `
        <div style="margin-bottom: 1.5rem; border-radius: 20px; overflow: hidden;">
          <div style="position: relative; padding-bottom: 56.25%; height: 0;">
            <iframe 
              style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;"
              src="${escapeHtml(post.videoEmbedUrl)}" 
              frameborder="0" 
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
              allowfullscreen>
            </iframe>
          </div>
        </div>
      `;
    } else if (hasImage) {
      mediaHtml = `
        <img 
          src="${escapeHtml(post.imageUrl)}" 
          alt="${escapeHtml(post.title)}" 
          style="width: 100%; border-radius: 20px; margin-bottom: 1.5rem; object-fit: cover; max-height: 400px;"
          onerror="this.src='https://placehold.co/600x400/1e1e2a/7c3aed?text=Imagem+indisponível'"
        >
      `;
    }
    
    modalContent.innerHTML = `
      <button style="
        position: sticky;
        top: 0;
        float: right;
        background: #2a2a35;
        border: none;
        color: #ecedee;
        font-size: 1.5rem;
        cursor: pointer;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 1rem;
        transition: 0.2s;
      " class="close-modal">✕</button>
      <div style="clear: both"></div>
      ${mediaHtml}
      <h1 style="font-size: 1.8rem; margin-bottom: 1rem; color: #f0f0f5;">${escapeHtml(post.title)}</h1>
      <div style="font-size: 0.8rem; color: #9b8cbf; margin-bottom: 1.5rem; display: flex; gap: 1rem;">
        <span>📅 ${escapeHtml(postDate)}</span>
        ${hasVideo ? '<span>🎬 Vídeo incluído</span>' : ''}
      </div>
      <div style="color: #c5c5d2; line-height: 1.7; font-size: 1rem; white-space: pre-wrap;">
        ${escapeHtml(post.content).replace(/\n/g, '<br>')}
      </div>
    `;
    
    modal.appendChild(modalContent);
    document.body.appendChild(modal);
    modal.style.overflow = 'auto';
    
    // Close modal when clicking outside or on X
    const closeBtn = modalContent.querySelector('.close-modal');
    closeBtn.addEventListener('click', () => {
      document.body.removeChild(modal);
    });
    modal.addEventListener('click', (e) => {
      if (e.target === modal) {
        document.body.removeChild(modal);
      }
    });
    
    // Close on ESC key
    const escHandler = (e) => {
      if (e.key === 'Escape') {
        if (document.body.contains(modal)) {
          document.body.removeChild(modal);
          document.removeEventListener('keydown', escHandler);
        }
      }
    };
    document.addEventListener('keydown', escHandler);
  }

  // Initial load
  loadPosts();
</script>
</body>
</html>
